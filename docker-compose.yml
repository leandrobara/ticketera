services:
  app:
    build:
      context: .
      dockerfile: Dockerfile

    ports:
      - "8000:80"

    volumes:
      - .:/var/www/html

    depends_on:
      - mysql

  mysql:
    image: mysql:8.0

    ports:
      - "3307:3306"

    environment:
      MYSQL_DATABASE: tickets
      MYSQL_ROOT_PASSWORD: root

    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
